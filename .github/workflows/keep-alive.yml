name: Keep Render Backend Alive

on:
  schedule:
    # Runs every 14 minutes — just under Render's 15-min sleep threshold
    - cron: '*/14 * * * *'
  workflow_dispatch: # lets you trigger it manually from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_BACKEND_URL }}/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: backend returned $STATUS"
          fi
